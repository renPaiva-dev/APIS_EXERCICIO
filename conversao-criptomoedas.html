<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Preço - Binance</title>
  <link rel="stylesheet" href="conversao-criptomoedas.css">
  <script defer src = "conversao-criptomoedas.js"></script>
</head>
<body>
  <div class="container">
    <a href="./api-cachorro/">Questão 3 - API de cachorros</a>
    <br>
    <a href="./api-pokemon/">Questão 3 - API de Pokemon</a>
    <h1>Consultar Preço de Moedas</h1>
    <label for="moedaBase">Moeda Base (Ex.: BTC):</label>
    <input type="text" id="moedaBase" list="moedas" placeholder="Digite a moeda base">

    <label for="moedaConversao">Moeda Conversão (Ex.: USDT):</label>
    <input type="text" id="moedaConversao" list="moedas" placeholder="Digite a moeda de conversão">
    <datalist id="moedas">
      <option value="BTC">
      <option value="ETH">
      <option value="SOL">
      <option value="XRP">
      <option value="DOGE">
      <option value="USDT">
      <option value="BRL">
    </datalist>
    <button id="botaoConsultar">Consultar</button>
    <button id="botaoLimpar">Limpar consulta</button>
    <button id="botaoInverter">Inverter consulta</button>
    <div id="resultado"></div>
  </div>

</body>
</html>
